<div class="section">
  <h2>Schedule of Events</h2>

  <input type="date" id="calendar" onchange="showEvent()">

  <div id="eventDisplay" class="event-box">
    To be announced
  </div>
</div>

<style>
.event-box {
  margin-top: 15px;
  padding: 15px;
  background: #fff;
  border-left: 5px solid #1e3a8a;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}
</style>

<script>
function showEvent() {
  document.getElementById("eventDisplay").innerText = "To be announced";
}
</script>
