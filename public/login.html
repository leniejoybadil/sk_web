<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>

<title>SK Dalagdag Portal | Login</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

body {
  font-family: 'Inter', sans-serif;
  margin: 0;
  background-color: #f1f8e9;
}

.hero-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

@media (min-width: 768px) {
  .hero-img { height: 100vh; }
}

@media (max-width: 768px) {
  .hero-img { height: 220px; }
}

.login-card {
  background: rgba(255, 255, 255, 0.98);
  border-bottom: 10px solid #fbc02d;
}
</style>
</head>

<body class="min-h-screen flex flex-col">

<div class="flex flex-1 flex-col md:flex-row">

<!-- LEFT IMAGE -->
<div class="md:w-3/5 lg:w-2/3 bg-black overflow-hidden relative flex items-center">
    <img src="inside.png" class="hero-img">
    <div class="absolute inset-0 bg-black/30"></div>
</div>

<!-- RIGHT LOGIN -->
<div class="md:w-2/5 lg:w-1/3 flex items-center justify-center p-6">

<div class="w-full max-w-sm login-card rounded-3xl shadow-2xl overflow-hidden">

<!-- TITLE -->
<div class="p-6 text-center bg-white border-b border-gray-100">
    <h2 class="text-2xl font-black text-[#1b5e20] uppercase italic">
        SK DALAGDAG <br>
        <span class="text-[#795548] text-xl tracking-widest not-italic">
            PORTAL
        </span>
    </h2>
</div>

<!-- CONTENT -->
<div class="p-8 space-y-6">

<!-- GUEST -->
<button onclick="loginAsGuest()"
class="w-full bg-[#1b5e20] text-white font-bold py-4 rounded-xl shadow-lg hover:bg-[#2e7d32] transition">
CONTINUE AS GUEST 👤
</button>

<!-- DIVIDER -->
<div class="text-center text-xs text-gray-400">Or Admin Login</div>

<!-- ADMIN LOGIN -->
<form id="adminForm" class="space-y-3">

<input type="text" id="username" placeholder="Username"
class="w-full p-3 border-2 rounded-xl">

<input type="password" id="password" placeholder="Password"
class="w-full p-3 border-2 rounded-xl">

<button type="submit"
class="w-full bg-yellow-400 text-green-900 font-black py-3 rounded-xl">
ADMIN LOGIN 🔑
</button>

</form>

</div>

</div>
</div>

</div>

<!-- FOOTER -->
<footer class="bg-[#1b5e20] text-white text-center p-6 text-xs">
© 2026 SK DALAGDAG
</footer>

<script>

// ========================
// GUEST LOGIN
// ========================
function loginAsGuest() {
    localStorage.setItem('role', 'guest');
    window.location.href = "index.html";
}

// ========================
// ADMIN LOGIN
// ========================
document.getElementById('adminForm').addEventListener('submit', function(e){
    e.preventDefault();

    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;

    if(user === 'admin' && pass === 'luffy_28'){
        localStorage.setItem('role', 'admin');
        window.location.href = "index.html";
    } else {
        alert("Incorrect Admin Credentials");
    }
});

</script>

</body>
</html>
