<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
<title>Admin Login</title>
</head>

<body class="flex items-center justify-center h-screen bg-gray-100">

<div class="bg-white p-6 rounded shadow w-80">

  <h1 class="text-xl font-bold mb-4">SK Admin Login</h1>

  <input id="user" class="w-full p-2 border mb-2" placeholder="Username">
  <input id="pass" type="password" class="w-full p-2 border mb-2" placeholder="Password">

  <button onclick="login()" class="w-full bg-green-600 text-white p-2 rounded">
    Login
  </button>

</div>

<script>
function login(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  // 🔐 CHANGE THIS PASSWORD
  if(u === "admin" && p === "sk2026"){
    localStorage.setItem("skAdmin", "true");
    window.location.href = "admin.html";
  } else {
    alert("Wrong credentials");
  }
}
</script>

</body>
</html>
