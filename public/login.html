<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>

<title>SK Dalagdag Portal | Login</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

body {
  font-family: 'Inter', sans-serif;
  margin: 0;
  background-color: #f1f8e9;

  /* This will brighten your images inside the slidebar */
.swiper-slide img {
    filter: brightness(1.2) contrast(1.1); 
    /* 1.2 means 120% brightness. Adjust as needed! */
}
}

/* IMAGE FIX */
.hero-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Desktop */
@media (min-width: 768px) {
  .hero-img {
    height: 100vh;
  }
}

/* Mobile */
@media (max-width: 768px) {
  .hero-img {
    height: 220px;
  }
}

/* Login Card */
.login-card {
  background: rgba(255, 255, 255, 0.98);
  border-bottom: 10px solid #fbc02d;
}
</style>
</head>

<body class="min-h-screen flex flex-col">

<div class="flex flex-1 flex-col md:flex-row">

<!-- LEFT IMAGE -->
<div class="md:w-3/5 lg:w-2/3 bg-black overflow-hidden relative flex items-center">
    
    <img src="inside.png" class="hero-img">

    <!-- OPTIONAL OVERLAY -->
    <div class="absolute inset-0 bg-black/30"></div>

</div>

<!-- RIGHT LOGIN -->
<div class="md:w-2/5 lg:w-1/3 flex items-center justify-center p-6">
    
    <div class="w-full max-w-sm login-card rounded-3xl shadow-2xl overflow-hidden">
        
        <!-- TITLE -->
        <div class="p-6 text-center bg-white border-b border-gray-100">
            <h2 class="text-2xl font-black text-[#1b5e20] leading-none uppercase italic">
                SK DALAGDAG <br>
                <span class="text-[#795548] not-italic text-xl tracking-widest">
                    PORTAL
                </span>
            </h2>
        </div>

        <!-- CONTENT -->
        <div class="p-8 space-y-6">

            <!-- GUEST -->
            <div class="text-center">
                <button onclick="loginAsGuest()" class="w-full bg-[#1b5e20] text-white font-bold py-4 rounded-xl text-lg shadow-lg hover:bg-[#2e7d32] transition transform hover:scale-[1.02]">
                    CONTINUE AS GUEST 👤
                </button>
                <p class="text-[10px] text-gray-400 mt-2 uppercase tracking-tighter">
                    No account needed for viewing
                </p>
            </div>

            <!-- DIVIDER -->
            <div class="relative flex py-2 items-center">
                <div class="flex-grow border-t border-gray-200"></div>
                <span class="mx-4 text-gray-400 text-xs font-bold uppercase">
                    Or Admin Login
                </span>
                <div class="flex-grow border-t border-gray-200"></div>
            </div>

            <!-- ADMIN LOGIN -->
            <form id="adminForm" class="space-y-3">

<input type="text" id="username" placeholder="Enter username"
class="w-full p-3 border-2 rounded-xl">

<input type="password" id="password" placeholder="Enter password"
class="w-full p-3 border-2 rounded-xl">

                <button type="submit"
                class="w-full bg-[#ffeb3b] text-[#1b4332] font-black py-3 rounded-xl shadow hover:bg-yellow-400">
                    ADMIN LOG IN 🔑
                </button>

            </form>
        </div>

        <!-- FOOT -->
        <div class="bg-[#fafafa] p-5 text-center border-t border-gray-100">
            <a href="kk.html" class="text-[#795548] font-black text-xs hover:underline tracking-widest">
                📋 KK PROFILING REGISTRATION
            </a>
        </div>

    </div>
</div>

</div>

<!-- FOOTER -->
<footer class="bg-[#1b5e20] text-white pt-10 pb-6 px-10">
<div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-4 gap-10 text-sm">

<div>
<h3 class="font-bold mb-4 uppercase text-green-300">Visit Us</h3>
<p>Barangay Hall of Dalagdag<br>Calinan District, Davao City</p>

<h3 class="font-bold mt-6 mb-2 uppercase text-green-300">Contact</h3>
<p>0931 159 4097</p>
<p class="underline">skdalagdag@gmail.com</p>
</div>

<div>
<h3 class="font-bold mb-4 uppercase text-green-300">Programs</h3>
<a href="kk.html">KK Profiling</a><br>
<a href="events.html">Events</a>
</div>

</div>

<div class="mt-10 pt-4 border-t text-center text-[10px] opacity-50 uppercase">
© 2026 SK DALAGDAG
</div>
</footer>

<script>

    function login() {
    sessionStorage.setItem('role', 'admin'); // or "user"

    setTimeout(() => {
        window.location.href = "index.html";
    }, 50);
}
// GUEST
function login() {
    localStorage.setItem('role', 'admin'); // or user
    window.location.href = "index.html";
}


// ADMIN
document.getElementById('adminForm').addEventListener('submit', function(e){
  e.preventDefault();

  const user = username.value;
  const pass = password.value;

  if(user === 'admin' && pass === 'luffy_28'){
    sessionStorage.setItem('role','admin');
    window.location.href="index.html";
  } else {
    alert("Incorrect Admin Credentials");
  }
});
</script>

</body>
</html>
