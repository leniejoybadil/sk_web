<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>SK Dalagdag | Community Wall</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');
        body { font-family: 'Roboto', sans-serif; background-color: #f0f2f5; margin: 0; }
        
        .sidebar { width: 260px; height: 100vh; position: fixed; background: #1b5e20; color: white; padding: 20px; z-index: 100; }
        .main-content { margin-left: 260px; padding: 0; }

        .post-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            overflow: hidden;
        }

        .reaction-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: #65676b;
            transition: background 0.2s;
        }
        .reaction-btn:hover { background: #f2f2f2; }

        @media(max-width:768px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; }
        }
    </style>
</head>
<body class="flex">

<aside class="sidebar">
    <h2 class="text-xl font-bold mb-6 text-center border-b border-white/20 pb-4">SK DALAGDAG</h2>
    <nav class="space-y-2">
        <a href="index.html" class="block p-3 hover:bg-white/10 rounded-lg">📊 Dashboard</a>
        <a href="suggestions.html" class="block p-3 bg-white/20 rounded-lg font-bold">💡 Community Wall</a>
    </nav>
</aside>

<main class="main-content flex-1">
    <header class="bg-white p-4 px-8 border-b border-gray-200 sticky top-0 z-50">
        <h1 class="text-gray-500 text-sm font-medium">Community / <span class="text-green-700 font-bold uppercase">Wall</span></h1>
    </header>

    <div class="p-4 md:p-8 max-w-2xl mx-auto">
        
        <div class="bg-white p-4 rounded-xl shadow-md mb-8">
            <div class="flex gap-3 mb-4">
                <div class="w-10 h-10 rounded-full bg-green-700 flex items-center justify-center text-white font-bold">👤</div>
                <input id="nickname" type="text" placeholder="Nickname" class="bg-gray-100 rounded-full flex-1 px-4 outline-none border-none text-sm">
            </div>
            <textarea id="suggestion" rows="2" placeholder="What's on your mind, SK Youth?" class="w-full p-2 outline-none text-lg"></textarea>
            <hr class="my-3">
            <button onclick="savePost()" class="w-full bg-green-700 text-white font-bold py-2 rounded-lg hover:bg-green-800 transition">Post Activity Suggestion</button>
        </div>

        <div id="postFeed"></div>
    </div>
</main>

<script>
    const role = sessionStorage.getItem('role');

    window.onload = displayPosts;

    function savePost() {
        const nick = document.getElementById('nickname').value || "Anonymous";
        const msg = document.getElementById('suggestion').value;
        if(!msg) return alert("Write something first!");

        const newPost = {
            id: Date.now(),
            author: nick,
            text: msg,
            date: new Date().toLocaleString(),
            reactions: { like: 0, heart: 0, angry: 0 },
            replies: []
        };

        let posts = JSON.parse(localStorage.getItem('sk_posts')) || [];
        posts.unshift(newPost);
        localStorage.setItem('sk_posts', JSON.stringify(posts));

        document.getElementById('suggestion').value = '';
        displayPosts();
    }

    function displayPosts() {
        const posts = JSON.parse(localStorage.getItem('sk_posts')) || [];
        const feed = document.getElementById('postFeed');
        feed.innerHTML = '';

        posts.forEach(post => {
            const card = document.createElement('div');
            card.className = "post-card p-4";
            
            let deleteBtn = (role === 'admin') ? `<button onclick="deletePost(${post.id})" class="text-red-500 text-xs font-bold">Delete Post</button>` : '';

            card.innerHTML = `
                <div class="flex justify-between items-start mb-3">
                    <div class="flex gap-2">
                        <div class="w-10 h-10 rounded-full bg-gray-200 flex items-center justify-center font-bold text-gray-500">👤</div>
                        <div>
                            <h4 class="font-bold text-gray-900 text-sm">${post.author}</h4>
                            <p class="text-[10px] text-gray-500">${post.date}</p>
                        </div>
                    </div>
                    ${deleteBtn}
                </div>
                <p class="text-gray-800 text-sm mb-4">${post.text}</p>
                
                <div class="flex border-t border-b border-gray-100 py-1 mb-3 justify-around">
                    <button onclick="react(${post.id}, 'like')" class="reaction-btn">👍 ${post.reactions.like || 0}</button>
                    <button onclick="react(${post.id}, 'heart')" class="reaction-btn">❤️ ${post.reactions.heart || 0}</button>
                    <button onclick="react(${post.id}, 'angry')" class="reaction-btn">😡 ${post.reactions.angry || 0}</button>
                </div>

                <div class="space-y-2 mb-3">
                    ${post.replies.map(r => `
                        <div class="bg-gray-50 p-2 rounded-lg text-xs">
                            <span class="font-bold text-green-800">${r.author}:</span> ${r.text}
                        </div>
                    `).join('')}
                </div>

                <div class="flex gap-2">
                    <input id="reply-${post.id}" type="text" placeholder="Write a reply..." class="bg-gray-100 rounded-full flex-1 px-3 py-1 text-xs outline-none">
                    <button onclick="addReply(${post.id})" class="text-green-700 font-bold text-xs">Reply</button>
                </div>
            `;
            feed.appendChild(card);
        });
    }

    function react(postId, type) {
        let posts = JSON.parse(localStorage.getItem('sk_posts'));
        const index = posts.findIndex(p => p.id === postId);
        posts[index].reactions[type]++;
        localStorage.setItem('sk_posts', JSON.stringify(posts));
        displayPosts();
    }

    function addReply(postId) {
        const input = document.getElementById(`reply-${postId}`);
        if(!input.value) return;

        let posts = JSON.parse(localStorage.getItem('sk_posts'));
        const index = posts.findIndex(p => p.id === postId);
        
        posts[index].replies.push({
            author: role === 'admin' ? "Admin" : "Guest",
            text: input.value
        });

        localStorage.setItem('sk_posts', JSON.stringify(posts));
        displayPosts();
    }

    function deletePost(id) {
        if(confirm("Admin: Delete this post?")) {
            let posts = JSON.parse(localStorage.getItem('sk_posts')).filter(p => p.id !== id);
            localStorage.setItem('sk_posts', JSON.stringify(posts));
            displayPosts();
        }
    }
</script>
</body>
</html>
