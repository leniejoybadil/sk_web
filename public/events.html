<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SK Event Registration</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f4f4f4;
}

.container {
  padding: 20px;
  text-align: center;
}

/* EVENT BUTTONS */
button.event-btn {
  display: block;
  width: 90%;
  margin: 10px auto;
  padding: 15px;
  font-size: 16px;
  background: #1e3a8a;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
}

.modal-content {
  background: white;
  width: 90%;
  max-width: 400px;
  margin: 50px auto;
  padding: 20px;
  border-radius: 10px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
}

.close {
  float: right;
  cursor: pointer;
  font-size: 20px;
}
</style>
</head>

<body>

<div class="container">

<h2>SK Event Registration</h2>

<button class="event-btn" onclick="openForm('KK Assembly 2026')">KK Assembly 2026</button>
<button class="event-btn" onclick="openForm('Linggo ng Kabataan 2026')">Linggo ng Kabataan 2026</button>
<button class="event-btn" onclick="openForm('Basketball Mosquito Division')">Basketball Mosquito Division</button>
<button class="event-btn" onclick="openForm('Interpurok Basketball')">Interpurok Basketball</button>
<button class="event-btn" onclick="openForm('Sepak Takraw')">Sepak Takraw</button>
<button class="event-btn" onclick="openForm('Volleyball Tournament')">Volleyball Tournament</button>
<button class="event-btn" onclick="openForm('Gardening Activity')">Gardening Activity</button>

</div>

<!-- POPUP FORM -->
<div id="modal" class="modal">
  <div class="modal-content">

    <span class="close" onclick="closeForm()">&times;</span>
    <h3 id="eventTitle"></h3>

    <input type="text" id="name" placeholder="Full Name">
    <input type="number" id="age" placeholder="Age">

    <select id="purok">
      <option>Purok 1</option>
      <option>Purok 2</option>
      <option>Purok 3</option>
      <option>Purok 4</option>
      <option>Purok 5</option>
      <option>Purok 6</option>
      <option>Purok 7</option>
      <option>Purok 8</option>
      <option>Purok 9</option>
    </select>

    <select id="team">
      <option value="">No Team</option>
      <option>Team 1</option>
      <option>Team 2</option>
      <option>Team 3</option>
      <option>Team 4</option>
    </select>

    <button onclick="submitForm()">Submit</button>

  </div>
</div>

<script>
let selectedEvent = "";

// OPEN FORM
function openForm(eventName) {
  selectedEvent = eventName;
  document.getElementById("eventTitle").innerText = eventName;
  document.getElementById("modal").style.display = "block";
}

// CLOSE FORM
function closeForm() {
  document.getElementById("modal").style.display = "none";
}

// SUBMIT FORM TO GOOGLE APPS SCRIPT
function submitForm() {

  const data = {
    event: selectedEvent,
    name: document.getElementById("name").value,
    age: document.getElementById("age").value,
    purok: document.getElementById("purok").value,
    team: document.getElementById("team").value
  };

  fetch("https://script.google.com/macros/s/AKfycbzeyql6hVgTJiio8NLBsa2gzbGSB_WzFLXQNJ1i_sX3_4JR3P1a9HcJVx2T6rxJ-VQi/exec", {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(res => {
    alert("Successfully Registered!");
    closeForm();
  })
  .catch(err => {
    alert("Error submitting form");
    console.log(err);
  });

}
</script>

</body>
</html>
