<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Event Registration</title>
</head>
<body class="bg-gray-100 p-3">

<div class="max-w-md mx-auto">
    <h2 class="font-bold text-2xl mb-4 text-green-800 text-center">Event Registration</h2>

    <div class="grid gap-2">
        <button onclick="openForm('KK Assembly 2026')" class="bg-green-700 hover:bg-green-800 text-white p-3 rounded-lg shadow transition">KK Assembly 2026</button>
        <button onclick="openForm('Linggo ng Kabataan 2026')" class="bg-green-700 hover:bg-green-800 text-white p-3 rounded-lg shadow transition">Linggo ng Kabataan 2026</button>
        <button onclick="openForm('Basketball Mosquito Division')" class="bg-green-700 hover:bg-green-800 text-white p-3 rounded-lg shadow transition text-sm text-left">23rd Araw ng Barangay Dalagdag Basketball League Mosquito Division</button>
        <button onclick="openForm('Interpurok Basketball')" class="bg-green-700 hover:bg-green-800 text-white p-3 rounded-lg shadow transition text-sm text-left">23rd Araw ng Barangay Dalagdag Interpurok Basketball League</button>
        <button onclick="openForm('Volleyball Tournament')" class="bg-green-700 hover:bg-green-800 text-white p-3 rounded-lg shadow transition text-sm text-left">23rd Araw ng Barangay Dalagdag Volleyball Tournament</button>
        <button onclick="openForm('Sepak Takraw')" class="bg-green-700 hover:bg-green-800 text-white p-3 rounded-lg shadow transition text-sm text-left">23rd Araw ng Barangay Dalagdag Sepak Takraw Tournament</button>
        <button onclick="openForm('Gardening Activity')" class="bg-green-700 hover:bg-green-800 text-white p-3 rounded-lg shadow transition">Binhi ng Pag-asa: Gardening Activity</button>
        
        <button onclick="location.href='index.html'" class="mt-4 text-gray-600 text-center text-sm underline">Back to Dashboard</button>
    </div>
</div>

<div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-60 flex justify-center items-center p-4 z-50">
    <div class="bg-white p-6 rounded-xl w-full max-w-md shadow-2xl">
        <h3 id="eventTitle" class="font-bold text-xl text-green-900 mb-4 border-b pb-2"></h3>

        <div class="space-y-3">
            <input id="name" placeholder="Full Name" class="border p-3 w-full rounded-lg outline-none focus:ring-2 focus:ring-green-500">
            <input id="age" type="number" placeholder="Age" class="border p-3 w-full rounded-lg outline-none focus:ring-2 focus:ring-green-500">

            <select id="purok" class="border p-3 w-full rounded-lg outline-none focus:ring-2 focus:ring-green-500 bg-white">
                <option value="" disabled selected>Select Purok</option>
                <option>Purok 1</option><option>Purok 2</option><option>Purok 3</option><option>Purok 4</option>
                <option>Purok 5</option><option>Purok 6</option><option>Purok 7</option><option>Purok 8</option><option>Purok 9</option>
            </select>

            <select id="team" class="border p-3 w-full rounded-lg outline-none focus:ring-2 focus:ring-green-500 bg-white hidden">
                <option value="" disabled selected>Select Team</option>
                <option>Team 1</option><option>Team 2</option><option>Team 3</option><option>Team 4</option>
            </select>

            <div id="idSection" class="hidden">
                <p class="text-red-600 font-bold text-xs mb-1">⚠ VALID ID REQUIRED (PHOTO)</p>
                <input type="file" id="validid" accept="image/*" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-green-50 file:text-green-700 hover:file:bg-green-100">
            </div>
        </div>

        <div class="flex gap-2 mt-6">
            <button id="submitBtn" onclick="submitForm()" class="bg-blue-700 hover:bg-blue-800 text-white flex-1 p-3 rounded-lg font-bold transition">Submit</button>
            <button onclick="closeForm()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 flex-1 p-3 rounded-lg font-bold transition">Cancel</button>
        </div>
    </div>
</div>

<script>
let selectedEvent = "";
const scriptURL = "https://script.google.com/macros/s/AKfycbwBWYAtrGy5N0LG0S2TkUg9eKakrPNfmne6QFKYZTWX5qjz8lSAZT5gX3d8iN1bXyM/exec";
function openForm(eventName){
    selectedEvent = eventName;
    document.getElementById("eventTitle").innerText = eventName;
    document.getElementById("modal").classList.remove("hidden");

    // Hide conditional sections by default
    document.getElementById("team").classList.add("hidden");
    document.getElementById("idSection").classList.add("hidden");

    // Show Team for Sports
    if(eventName.includes("Basketball") || eventName.includes("Volleyball") || eventName.includes("Sepak Takraw")){
        if(!eventName.includes("Interpurok")) document.getElementById("team").classList.remove("hidden");
        document.getElementById("idSection").classList.remove("hidden");
    }
}

function closeForm(){
    document.getElementById("modal").classList.add("hidden");
}

function submitForm(){
    const name = document.getElementById("name").value;
    const age = document.getElementById("age").value;
    const purok = document.getElementById("purok").value;
    const team = document.getElementById("team").value || "N/A";
    const fileInput = document.getElementById("validid");
    const file = fileInput.files[0];
    const btn = document.getElementById("submitBtn");

    if(!name || !age || !purok){
        alert("Please complete all required fields");
        return;
    }

    if(!document.getElementById("idSection").classList.contains("hidden") && !file){
        alert("Valid ID image is required for this event");
        return;
    }

    btn.innerText = "Processing...";
    btn.disabled = true;

    if(file){
        const reader = new FileReader();
        reader.onload = function(e) {
            const base64 = e.target.result.split(",")[1];
            sendData(base64, file.name, file.type);
        };
        reader.readAsDataURL(file);
    } else {
        sendData("", "", "");
    }

    function sendData(base64, filename, mimeType) {
        const formData = new URLSearchParams();
        formData.append("event", selectedEvent);
        formData.append("name", name);
        formData.append("age", age);
        formData.append("purok", purok);
        formData.append("team", team);
        formData.append("validid", base64);
        formData.append("filename", filename);
        formData.append("mimeType", mimeType);

        fetch(scriptURL, { method: "POST", mode: "no-cors", body: formData })
        .then(() => {
            alert("Successfully Registered for " + selectedEvent + "!");
            location.reload();
        })
        .catch(err => {
            alert("Error submitting. Please check your connection.");
            btn.innerText = "Submit";
            btn.disabled = false;
        });
    }
}
</script>

</body>
</html>
