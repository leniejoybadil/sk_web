<script>
    // =========================
    // FIX: ROLE CHECK (IMPORTANT)
    // =========================
    const role = localStorage.getItem('role');

    if (role === 'admin') {
        document.getElementById('adminOnlyForm').classList.remove('hidden');
    }

    // =========================
    // LOAD ANNOUNCEMENTS
    // =========================
    function loadAnnouncements() {
        let posts = JSON.parse(localStorage.getItem("announcements")) || [];

        const feed = document.getElementById("announcementFeed");

        // keep default welcome post
        feed.innerHTML = `
        <div class="announcement-card bg-white p-5 rounded-xl shadow-sm">
            <div class="flex justify-between items-start mb-2">
                <h3 class="font-bold text-lg text-gray-800">Welcome to the New Portal!</h3>
                <span class="text-[10px] bg-gray-100 text-gray-500 px-2 py-1 rounded">Just Now</span>
            </div>
            <p class="text-gray-600 leading-relaxed text-sm">
                Barangay Dalagdag SK is now digital. You can now register for events and KK profiling online!
            </p>
        </div>
        `;

        posts.forEach(p => {
            feed.innerHTML += `
                <div class="announcement-card bg-white p-5 rounded-xl shadow-sm">
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="font-bold text-lg text-gray-800">${p.title}</h3>
                        <span class="text-[10px] bg-gray-100 text-gray-500 px-2 py-1 rounded">${p.date}</span>
                    </div>
                    <p class="text-gray-600 leading-relaxed text-sm">${p.message}</p>
                </div>
            `;
        });
    }

    loadAnnouncements();

    // =========================
    // POST ANNOUNCEMENT (ADMIN ONLY)
    // =========================
    function postAnnouncement() {
        const title = document.getElementById('title').value;
        const msg = document.getElementById('message').value;
        const btn = document.getElementById('postBtn');

        if (role !== 'admin') {
            alert("Only admin can post announcements!");
            return;
        }

        if (!title || !msg) {
            alert("Please fill in both fields");
            return;
        }

        let posts = JSON.parse(localStorage.getItem("announcements")) || [];

        posts.unshift({
            title: title,
            message: msg,
            date: new Date().toLocaleString()
        });

        localStorage.setItem("announcements", JSON.stringify(posts));

        btn.innerText = "Posting...";
        btn.disabled = true;

        setTimeout(() => {
            btn.innerText = "Publish Announcement";
            btn.disabled = false;

            document.getElementById('title').value = "";
            document.getElementById('message').value = "";

            loadAnnouncements();
        }, 500);
    }
</script>
