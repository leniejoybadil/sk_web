<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
<title>SK Announcements</title>

<style>
body { font-family: 'Inter', sans-serif; background: #f8fafc; }

.announcement-card {
    border-left: 5px solid #15803d;
    transition: transform 0.2s;
}
.announcement-card:hover { transform: scale(1.01); }

.pin {
    background: #dbeafe;
    border-left: 5px solid #2563eb;
}
</style>
</head>

<body class="p-4 md:p-8">

<div class="max-w-3xl mx-auto">

<!-- HEADER -->
<div class="flex justify-between items-center mb-6">
    <div>
        <h1 class="text-3xl font-bold">📢 Announcements</h1>
        <p class="text-gray-500 text-sm">Barangay Dalagdag</p>
    </div>

    <div class="flex items-center gap-4">

        <!-- NOTIFICATION -->
        <div class="relative text-xl">
            🔔
            <span id="notifBadge"
            class="absolute -top-2 -right-2 bg-red-600 text-white text-[10px] px-1 rounded-full">
            0
            </span>
        </div>

        <button onclick="location.href='index.html'" class="text-sm">← Back</button>
    </div>
</div>

<!-- ADMIN FORM -->
<div id="adminOnlyForm" class="hidden bg-white p-6 rounded-xl shadow mb-8">

    <input id="title" type="text" placeholder="Title"
    class="w-full p-2 border rounded mb-2">

    <textarea id="message" placeholder="Message"
    class="w-full p-2 border rounded mb-2"></textarea>

    <!-- IMAGE UPLOAD -->
    <input id="image" type="file" accept="image/*"
    class="w-full p-2 border rounded mb-3">

    <button onclick="postAnnouncement()"
    class="w-full bg-green-700 text-white py-2 rounded">
        Post Announcement
    </button>
</div>

<!-- FEED -->
<div id="announcementFeed" class="space-y-4"></div>

</div>

<script>

const role = localStorage.getItem("role");

/* SHOW ADMIN FORM */
if (role === "admin") {
    document.getElementById("adminOnlyForm").classList.remove("hidden");
}

/* LOAD POSTS */
function loadAnnouncements() {

    let posts = JSON.parse(localStorage.getItem("sk_announcements")) || [];

    // PINNED FIRST
    posts.sort((a, b) => (b.pinned === true) - (a.pinned === true));

    const feed = document.getElementById("announcementFeed");
    feed.innerHTML = "";

    posts.forEach(p => {

        feed.innerHTML += `
        <div class="announcement-card bg-white p-5 rounded-xl shadow ${p.pinned ? 'pin' : ''}">

            <div class="flex justify-between">
                <h3 class="font-bold">${p.title}</h3>

                <div class="flex gap-2">

                ${role === "admin" ? `
                    <button onclick="deleteAnnouncement(${p.id})"
                    class="text-red-600 text-xs">🗑</button>

                    <button onclick="pinAnnouncement(${p.id})"
                    class="text-blue-600 text-xs">📌</button>
                ` : ""}

                </div>
            </div>

            <p class="text-sm mt-2">${p.message}</p>

            ${p.image ? `<img src="${p.image}" class="mt-2 rounded">` : ""}

            <!-- REACTIONS -->
            <div class="flex gap-3 mt-3 text-sm">
                <button onclick="react(${p.id},'like')">👍 ${p.reactions?.like||0}</button>
                <button onclick="react(${p.id},'heart')">❤️ ${p.reactions?.heart||0}</button>
                <button onclick="react(${p.id},'wow')">😮 ${p.reactions?.wow||0}</button>
                <button onclick="react(${p.id},'sad')">😢 ${p.reactions?.sad||0}</button>
            </div>

        </div>`;
    });

    updateNotifications();
}

/* POST */
function postAnnouncement() {

    const title = document.getElementById("title").value;
    const message = document.getElementById("message").value;
    const imageInput = document.getElementById("image");

    if (!title || !message) return alert("Fill all fields");

    let posts = JSON.parse(localStorage.getItem("sk_announcements")) || [];

    function save(img) {

        posts.unshift({
            id: Date.now(),
            title,
            message,
            image: img,
            pinned: false,
            reactions: { like:0, heart:0, wow:0, sad:0 }
        });

        localStorage.setItem("sk_announcements", JSON.stringify(posts));
        loadAnnouncements();
    }

    if (imageInput.files[0]) {
        let reader = new FileReader();
        reader.onload = e => save(e.target.result);
        reader.readAsDataURL(imageInput.files[0]);
    } else {
        save("");
    }
}

/* DELETE */
function deleteAnnouncement(id) {
    let posts = JSON.parse(localStorage.getItem("sk_announcements")) || [];
    posts = posts.filter(p => p.id !== id);
    localStorage.setItem("sk_announcements", JSON.stringify(posts));
    loadAnnouncements();
}

/* PIN */
function pinAnnouncement(id) {
    let posts = JSON.parse(localStorage.getItem("sk_announcements")) || [];

    posts = posts.map(p => {
        if (p.id === id) p.pinned = !p.pinned;
        return p;
    });

    localStorage.setItem("sk_announcements", JSON.stringify(posts));
    loadAnnouncements();
}

/* REACTIONS */
function react(id, type) {
    let posts = JSON.parse(localStorage.getItem("sk_announcements")) || [];

    const i = posts.findIndex(p => p.id === id);

    if (!posts[i].reactions) {
        posts[i].reactions = {like:0, heart:0, wow:0, sad:0};
    }

    posts[i].reactions[type]++;

    localStorage.setItem("sk_announcements", JSON.stringify(posts));
    loadAnnouncements();
}

/* NOTIFICATION */
function updateNotifications() {
    let posts = JSON.parse(localStorage.getItem("sk_announcements")) || [];
    let lastSeen = localStorage.getItem("lastSeen") || 0;

    let count = posts.filter(p => p.id > lastSeen).length;

    document.getElementById("notifBadge").innerText = count;
}

/* INIT */
window.onload = () => {
    loadAnnouncements();

    let posts = JSON.parse(localStorage.getItem("sk_announcements")) || [];
    if (posts.length > 0) {
        localStorage.setItem("lastSeen", posts[0].id);
    }
};

</script>

</body>
</html>
