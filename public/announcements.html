<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>

<title>SK Announcements</title>

<style>
body { font-family: 'Inter', sans-serif; background: #f8fafc; }

.announcement-card {
    border-left: 5px solid #15803d;
    transition: transform 0.2s;
}

.announcement-card:hover {
    transform: scale(1.01);
}
</style>
</head>

<body class="p-4 md:p-8">

<div class="max-w-3xl mx-auto">

<!-- HEADER -->
<div class="flex justify-between items-center mb-6">
    <div>
        <h1 class="text-3xl font-bold">📢 Announcements</h1>
        <p class="text-gray-500 text-sm">Barangay Dalagdag SK</p>
    </div>

    <button onclick="location.href='index.html'" class="text-sm text-gray-600">
        ← Back
    </button>
</div>

<!-- ADMIN FORM -->
<div id="adminOnlyForm" class="hidden bg-white p-6 rounded-xl shadow mb-8">

    <input id="title" type="text" placeholder="Title"
    class="w-full p-2 border rounded mb-2">

    <textarea id="message" placeholder="Message"
    class="w-full p-2 border rounded mb-2"></textarea>

    <input id="image" type="file" accept="image/*"
    class="w-full p-2 border rounded mb-3">

    <button onclick="postAnnouncement()"
    class="w-full bg-green-700 text-white py-2 rounded">
        Post Announcement
    </button>
</div>

<!-- FEED -->
<div id="announcementFeed" class="space-y-4"></div>

</div>

<script>

const role = sessionStorage.getItem("role");

/* SHOW ADMIN FORM ONLY */
if (role === "admin") {
    document.getElementById("adminOnlyForm").classList.remove("hidden");
}

/* LOAD ANNOUNCEMENTS */
function loadAnnouncements() {

    let posts = JSON.parse(localStorage.getItem("announcements")) || [];

    const feed = document.getElementById("announcementFeed");

    feed.innerHTML = "";

    // default post (old “news style”)
    feed.innerHTML += `
    <div class="announcement-card bg-white p-5 rounded-xl shadow-sm">
        <h3 class="font-bold text-lg">Welcome to SK Portal</h3>
        <p class="text-sm text-gray-600">
            Barangay Dalagdag SK is now digital.
        </p>
    </div>
    `;

    posts.forEach(p => {
        feed.innerHTML += `
        <div class="announcement-card bg-white p-5 rounded-xl shadow-sm">
            <h3 class="font-bold text-lg">${p.title}</h3>
            <p class="text-sm text-gray-600 mt-1">${p.message}</p>

            ${p.image ? `<img src="${p.image}" class="mt-3 rounded-lg">` : ""}
            
            <p class="text-[10px] text-gray-400 mt-2">${p.date}</p>
        </div>
        `;
    });
}

loadAnnouncements();

/* POST ANNOUNCEMENT (ADMIN ONLY) */
function postAnnouncement() {

    if (sessionStorage.getItem("role") !== "admin") {
        alert("Admin only can post announcements!");
        return;
    }

    const title = document.getElementById("title").value;
    const message = document.getElementById("message").value;
    const imageInput = document.getElementById("image");

    if (!title || !message) {
        alert("Please fill all fields");
        return;
    }

    let posts = JSON.parse(localStorage.getItem("announcements")) || [];

    function save(imageData) {

        const newPost = {
            id: Date.now(),
            title,
            message,
            image: imageData,
            date: new Date().toLocaleString()
        };

        posts.unshift(newPost);

        localStorage.setItem("announcements", JSON.stringify(posts));

        location.reload();
    }

    if (imageInput.files[0]) {
        const reader = new FileReader();
        reader.onload = e => save(e.target.result);
        reader.readAsDataURL(imageInput.files[0]);
    } else {
        save("");
    }
}

</script>

</body>
</html>
