<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-3">

<h2 class="font-bold text-lg">Announcements</h2>

<textarea id="announceText" class="border p-2 w-full my-2" placeholder="Write announcement..."></textarea>

<button onclick="post()" class="bg-green-700 text-white px-4 py-2 rounded">
Post
</button>

<div id="list" class="mt-3"></div>

<script>
let data = [];

function post(){
  data.unshift({
    text: announceText.value,
    date: new Date().toLocaleString()
  });

  announceText.value = "";
  render();
}

function render(){
  list.innerHTML = data.map(a=>`
    <div class="bg-white p-2 my-2 rounded shadow">
      <p>${a.text}</p>
      <small>${a.date}</small>
    </div>
  `).join("");
}
</script>

</body>
</html>
