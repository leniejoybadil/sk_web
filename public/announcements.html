<div class="section">
  <h2>Announcements</h2>

  <div id="announcementBox" class="announcement-box">
    No announcement.
  </div>

  <!-- ADMIN PANEL (hidden in real system later) -->
  <div id="adminPanel">
    <input type="text" id="announcementInput" placeholder="Post announcement">
    <button onclick="postAnnouncement()">Post</button>
  </div>
</div>

<style>
.section {
  padding: 20px;
}

.announcement-box {
  background: #fff;
  padding: 20px;
  border-left: 5px solid #1e3a8a;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  margin-bottom: 10px;
}

#adminPanel input {
  width: 70%;
  padding: 10px;
}

#adminPanel button {
  padding: 10px;
  background: #1e3a8a;
  color: white;
  border: none;
}
</style>

<script>
function postAnnouncement() {
  const text = document.getElementById("announcementInput").value;

  if (text.trim() === "") return;

  document.getElementById("announcementBox").innerText = text;
  document.getElementById("announcementInput").value = "";
}
</script>
