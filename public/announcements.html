<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
<title>SK Announcements</title>

<style>
body { font-family: 'Inter', sans-serif; background: #f8fafc; }

.announcement-card {
    border-left: 5px solid #15803d;
    transition: 0.2s;
}
.announcement-card:hover { transform: scale(1.01); }

.pin {
    border-left: 5px solid #2563eb;
    background: #eff6ff;
}
</style>
</head>

<body class="p-4 md:p-8">

<div class="max-w-3xl mx-auto">

<!-- HEADER -->
<div class="flex justify-between items-center mb-6">
    <div>
        <h1 class="text-3xl font-bold">📢 Announcements</h1>
        <p class="text-gray-500 text-sm">Barangay Dalagdag</p>
    </div>

    <div class="flex items-center gap-4">

        <!-- NOTIFICATION -->
        <div class="relative text-xl">
            🔔
            <span id="notifBadge"
            class="absolute -top-2 -right-2 bg-red-600 text-white text-[10px] px-1 rounded-full">0</span>
        </div>

        <button onclick="location.href='index.html'" class="text-sm text-gray-600">
            ← Back
        </button>
    </div>
</div>

<!-- ADMIN FORM -->
<div id="adminOnlyForm" class="hidden bg-white p-6 rounded-xl shadow mb-8">

    <input id="title" type="text" placeholder="Title"
    class="w-full p-2 border rounded mb-2">

    <textarea id="message" placeholder="Message"
    class="w-full p-2 border rounded mb-2"></textarea>

    <button onclick="postAnnouncement()"
    class="w-full bg-green-700 text-white py-2 rounded">
        Post Announcement
    </button>

</div>

<!-- FEED -->
<div id="announcementFeed" class="space-y-4"></div>

</div>

<script>

const role = localStorage.getItem("role");
let lastSeen = localStorage.getItem("lastSeen") || 0;

/* SHOW ADMIN FORM */
if (role === "admin") {
    document.getElementById("adminOnlyForm").classList.remove("hidden");
}

/* LOAD POSTS */
function loadAnnouncements() {

    let posts = JSON.parse(localStorage.getItem("sk_announcements")) || [];

    // PIN FIRST
    posts.sort((a, b) => (b.pinned || 0) - (a.pinned || 0));

    const feed = document.getElementById("announcementFeed");
    feed.innerHTML = "";

    posts.forEach(p => {

        let r = p.reactions || {like:0};

        feed.innerHTML += `
        <div class="announcement-card p-5 bg-white rounded-xl shadow ${p.pinned ? 'pin' : ''}">

            <div class="flex justify-between">
                <h3 class="font-bold">${p.title}</h3>

                <div class="flex gap-2">

                ${role === "admin" ? `
                    <button onclick="deletePost(${p.id})">🗑</button>
                    <button onclick="togglePin(${p.id})">📌</button>
                ` : ""}

                </div>
            </div>

            <p class="text-sm mt-2">${p.message}</p>

            <!-- REACTIONS -->
            <div class="flex gap-4 mt-3 text-sm">
                <button onclick="react(${p.id})">❤️ ${r.like}</button>
            </div>

        </div>`;
    });

    updateNotif(posts);
}

/* POST */
function postAnnouncement() {

    if (role !== "admin") return alert("Admin only!");

    const title = document.getElementById("title").value;
    const message = document.getElementById("message").value;

    if (!title || !message) return alert("Fill all fields");

    let posts = JSON.parse(localStorage.getItem("sk_announcements")) || [];

    posts.unshift({
        id: Date.now(),
        title,
        message,
        pinned: false,
        reactions: {like:0},
        date: Date.now()
    });

    localStorage.setItem("sk_announcements", JSON.stringify(posts));

    loadAnnouncements();
}

/* DELETE */
function deletePost(id) {
    let posts = JSON.parse(localStorage.getItem("sk_announcements")) || [];
    posts = posts.filter(p => p.id !== id);
    localStorage.setItem("sk_announcements", JSON.stringify(posts));
    loadAnnouncements();
}

/* PIN */
function togglePin(id) {
    let posts = JSON.parse(localStorage.getItem("sk_announcements")) || [];

    posts = posts.map(p => {
        if (p.id === id) p.pinned = !p.pinned;
        return p;
    });

    localStorage.setItem("sk_announcements", JSON.stringify(posts));
    loadAnnouncements();
}

/* REACTION */
function react(id) {
    let posts = JSON.parse(localStorage.getItem("sk_announcements")) || [];

    let post = posts.find(p => p.id === id);
    if (!post.reactions) post.reactions = {like:0};

    post.reactions.like++;

    localStorage.setItem("sk_announcements", JSON.stringify(posts));
    loadAnnouncements();
}

/* NOTIFICATION */
function updateNotif(posts) {
    let count = posts.filter(p => p.id > lastSeen).length;
    document.getElementById("notifBadge").innerText = count;
}

/* INIT */
loadAnnouncements();

if (JSON.parse(localStorage.getItem("sk_announcements"))?.length) {
    localStorage.setItem("lastSeen", Date.now());
}

</script>

</body>
</html>
