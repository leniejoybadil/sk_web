<!DOCTYPE html>
<html>
<head>
  <title>SK DALAGDAG</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { font-family: Arial; }

    /* INTRO */
    #intro {
      position: fixed;
      inset: 0;
      background: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    @keyframes spinSlow {
      from {transform: rotate(0deg);}
      to {transform: rotate(360deg);}
    }

    .spin-logo {
      animation: spinSlow 3s linear infinite;
      width: 150px;
    }

    /* FALLING */
    .leaf {
      position: fixed;
      top: -20px;
      width: 15px;
      height: 15px;
      background: green;
      opacity: 0.6;
      animation: fall linear infinite;
    }

    @keyframes fall {
      to { transform: translateY(100vh); }
    }

    /* SECTIONS */
    .section { display: none; }

  </style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <img src="logo.jpg" class="spin-logo">
  <h2>SK DALAGDAG</h2>
</div>

<script>
setTimeout(()=>{
  document.getElementById("intro").style.display="none";
},3000);

// falling leaves
for(let i=0;i<15;i++){
  let leaf = document.createElement("div");
  leaf.className="leaf";
  leaf.style.left=Math.random()*100+"%";
  leaf.style.animationDuration=(3+Math.random()*5)+"s";
  document.body.appendChild(leaf);
}
</script>

<!-- MENU -->
<div class="p-4 grid grid-cols-2 gap-3">

<button onclick="showSection('kk')" class="bg-green-600 text-white h-24">KK PROFILING</button>
<button onclick="showSection('event')" class="bg-blue-600 text-white h-24">EVENT REGISTRATION</button>

</div>

<script>
function showSection(id){
  document.querySelectorAll('.section').forEach(s=>s.style.display='none');
  document.getElementById(id).style.display='block';
}
</script>

<!-- KK FORM -->
<div id="kk" class="section p-4">

<h3>KK PROFILING</h3>

<input id="fullname" placeholder="Full Name" class="border p-2 w-full mb-2">
<input id="contact" placeholder="Contact" class="border p-2 w-full mb-2">
<input id="email" placeholder="Email" class="border p-2 w-full mb-2">
<input id="address" placeholder="Address" class="border p-2 w-full mb-2">

<input type="date" id="birthdate" class="border p-2 w-full mb-2" onchange="calcAge()">
<input id="age" readonly class="border p-2 w-full mb-2">

<script>
function calcAge(){
  let b=new Date(birthdate.value);
  let t=new Date();
  age.value=t.getFullYear()-b.getFullYear();
}
</script>

<!-- CHECKBOX FIX -->
<div class="grid grid-cols-2 gap-2 mb-3">

<label class="flex items-center gap-2">
<input type="checkbox"> In-School Youth
</label>

<label class="flex items-center gap-2">
<input type="checkbox"> Out-of-School Youth
</label>

<label class="flex items-center gap-2">
<input type="checkbox"> Working Youth
</label>

<label class="flex items-center gap-2">
<input type="checkbox"> PWD
</label>

</div>

<button onclick="submitKK()" class="bg-green-700 text-white px-4 py-2">Submit</button>
<button onclick="window.print()" class="bg-red-600 text-white px-4 py-2 ml-2">PDF</button>

</div>

<!-- EVENT -->
<div id="event" class="section p-4">

<h3>EVENT REGISTRATION</h3>

<select id="eventName" class="border p-2 w-full mb-2">
<option>Basketball League</option>
</select>

<input id="participant" placeholder="Participant Name" class="border p-2 w-full mb-2">

<select id="purok" class="border p-2 w-full mb-2">
<option>Purok 1</option>
<option>Purok 2</option>
<option>Purok 3</option>
<option>Purok 4</option>
<option>Purok 5</option>
<option>Purok 6</option>
<option>Purok 7</option>
<option>Purok 8</option>
<option>Purok 9</option>
</select>

<input type="file" id="file" class="mb-2">

<button onclick="submitEvent()" class="bg-blue-700 text-white px-4 py-2">
Register
</button>

</div>

<!-- BACKEND CONNECTION -->
<script>
function submitKK(){

const formData = new FormData();
formData.append("fullname", fullname.value);
formData.append("address", address.value);

fetch("http://localhost:3000/submit",{
  method:"POST",
  body: formData
})
.then(res=>res.text())
.then(res=>alert(res));

}

function submitEvent(){

const formData = new FormData();
formData.append("event", eventName.value);
formData.append("fullname", participant.value);
formData.append("purok", purok.value);
formData.append("validID", file.files[0]);

fetch("http://localhost:3000/submit",{
  method:"POST",
  body: formData
})
.then(res=>res.text())
.then(res=>alert(res));

}
</script>

<!-- EXPORT -->
<div class="p-4">
<button onclick="window.open('http://localhost:3000/export')" class="bg-purple-700 text-white px-4 py-2">
Export Excel
</button>
</div>

</body>
</html>
