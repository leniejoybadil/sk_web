<!DOCTYPE html>
<html>
<head>
  <title>SK Website</title>

  <!-- ✅ THIS IS WHERE IT GOES -->
  <link rel="stylesheet" href="style.css">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<header>
  <h1>SK WEBSITE 🚀</h1>
  <p>Sangguniang Kabataan Portal</p>
</header>

<div class="container">

  <div class="card">
    <h2>📌 Projects</h2>
    <ul id="projects"></ul>
  </div>

  <div class="card">
    <h2>📅 Events</h2>
    <ul id="events"></ul>
  </div>

</div>

<script>
fetch("/projects")
  .then(res => res.json())
  .then(data => {
    document.getElementById("projects").innerHTML =
      data.map(p => `<li>${p.name}</li>`).join("");
  });

fetch("/events")
  .then(res => res.json())
  .then(data => {
    document.getElementById("events").innerHTML =
      data.map(e => `<li>${e.title}</li>`).join("");
  });
</script>

</body>
</html>
