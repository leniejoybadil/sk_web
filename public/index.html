<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>

<title>SK Dalagdag | Dashboard</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');

body {
  font-family: 'Roboto', sans-serif;
  background-color: #f0f2f5;
  margin: 0;
  overflow-x: hidden;
}

/* Sidebar */
.sidebar {
  width: 260px;
  height: 100vh;
  position: fixed;
  background: #1b5e20;
  color: white;
  padding: 20px;
  z-index: 100;
}

.main-content {
  margin-left: 260px;
  min-height: 100vh;
}

/* Cards */
.stats-card {
  background: white;
  border-radius: 8px;
  position: relative;
  box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  transition: 0.3s;
  margin-top: 20px;
}
.stats-card:hover {
  transform: translateY(-5px);
}

.card-icon {
  position: absolute;
  top: -15px;
  left: 15px;
  width: 60px;
  height: 60px;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 22px;
}

/* SLIDER */
.slide { display:none; }
.slide.active { display:block; }

.hero-banner {
  height: 260px;
}
@media(min-width:768px){
  .hero-banner { height: 360px; }
}

/* Mobile */
@media(max-width:768px){
  .sidebar { transform: translateX(-260px); }
  .sidebar.active { transform: translateX(0); }
  .main-content { margin-left: 0; }
}
</style>
</head>

<body class="flex">

<!-- SIDEBAR -->
<aside id="sidebar" class="sidebar">
<h2 class="text-xl font-bold text-center mb-6">SK DALAGDAG</h2>

<nav class="space-y-2">
<a href="index.html">📊 Dashboard</a><br>
<a href="announcements.html">📢 Announcements</a><br>
<a href="committees.html">👥 Committees</a><br>
<a href="schedules.html">📅 Schedule</a><br>
<a href="events.html">🏆 Events</a><br>
<a href="kk.html">📋 KK</a><br>
<a href="projects.html">📁 Projects</a><br>
<a href="suggestions.html">💡 Suggestions</a><br>
</nav>

<button onclick="logout()" class="mt-10 bg-red-600 w-full p-2 rounded">
Logout
</button>
</aside>

<!-- MAIN -->
<main class="main-content flex-1">

<header class="bg-white p-4 flex justify-between items-center">
<button onclick="toggleMenu()">☰</button>
<h1>Main / <span id="displayRole">USER</span></h1>
</header>

<div class="p-6">

<!-- SLIDER -->
<div class="hero-banner relative rounded-xl overflow-hidden shadow-lg">

<img src="bridge.png" class="slide active w-full h-full object-cover">
<img src="intro.png" class="slide w-full h-full object-cover">

<button onclick="changeSlide(-1)" class="absolute left-3 top-1/2 -translate-y-1/2 bg-black/40 text-white px-3 py-1">❮</button>
<button onclick="changeSlide(1)" class="absolute right-3 top-1/2 -translate-y-1/2 bg-black/40 text-white px-3 py-1">❯</button>

</div>

<!-- BUTTONS -->
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mt-10">

<div onclick="location.href='announcements.html'" class="stats-card p-6 cursor-pointer">
<div class="card-icon bg-orange-500">📢</div>
<h3 class="mt-6 font-bold">Announcements</h3>
</div>

<div onclick="location.href='committees.html'" class="stats-card p-6 cursor-pointer">
<div class="card-icon bg-[#795548]">👥</div>
<h3 class="mt-6 font-bold">Committees</h3>
</div>

<div onclick="location.href='kk.html'" class="stats-card p-6 cursor-pointer">
<div class="card-icon bg-green-600">📋</div>
<h3 class="mt-6 font-bold">KK</h3>
</div>

<div onclick="location.href='events.html'" class="stats-card p-6 cursor-pointer">
<div class="card-icon bg-blue-600">🏆</div>
<h3 class="mt-6 font-bold">Events</h3>
</div>

<div onclick="location.href='schedules.html'" class="stats-card p-6 cursor-pointer">
<div class="card-icon bg-amber-700">📅</div>
<h3 class="mt-6 font-bold">Schedule</h3>
</div>

<div onclick="location.href='suggestions.html'" class="stats-card p-6 cursor-pointer">
<div class="card-icon bg-red-600">💡</div>
<h3 class="mt-6 font-bold">Suggestions</h3>
</div>

<div onclick="location.href='projects.html'" class="stats-card p-6 cursor-pointer">
<div class="card-icon bg-purple-600">📁</div>
<h3 class="mt-6 font-bold">Projects</h3>
</div>

</div>

</div>
</main>

<script>
// LOGIN CHECK
if (!sessionStorage.getItem('role')) {
  window.location.href = "login.html";
}

// MENU
function toggleMenu(){
  document.getElementById('sidebar').classList.toggle('active');
}

// LOGOUT
function logout(){
  sessionStorage.clear();
  window.location.href="login.html";
}

// ROLE
const role = sessionStorage.getItem('role');
if(role){
  document.getElementById('displayRole').innerText = role;
}

// SLIDER
let index = 0;
const slides = document.querySelectorAll(".slide");

function showSlide(i){
  slides.forEach(s=>s.classList.remove("active"));
  slides[i].classList.add("active");
}

function changeSlide(n){
  index += n;
  if(index >= slides.length) index = 0;
  if(index < 0) index = slides.length - 1;
  showSlide(index);
}

setInterval(()=>changeSlide(1),4000);
</script>

</body>
</html>
