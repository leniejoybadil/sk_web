<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
<title>SK Dalagdag | Dashboard</title>

<style>
body { font-family: Arial; background:#f0f2f5; margin:0 }

/* Sidebar */
.sidebar{
  width:260px; height:100vh; position:fixed;
  background:#1b5e20; color:white; padding:20px;
}
.main-content{ margin-left:260px }

/* Slider */
.slide{ display:none }
.slide.active{ display:block }

.dot{
  height:10px; width:10px;
  margin:0 4px;
  background:#ccc;
  display:inline-block;
  border-radius:50%;
}
.dot.active{ background:#1b5e20 }

/* Cards */
.stats-card{
  background:white; border-radius:8px;
  position:relative; padding:20px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  cursor:pointer;
}
.card-icon{
  position:absolute; top:-15px; left:15px;
  width:50px; height:50px;
  display:flex; align-items:center; justify-content:center;
  color:white; font-size:20px;
  border-radius:6px;
}
</style>
</head>

<body class="flex">

<!-- SIDEBAR -->
<aside class="sidebar">
<h2 class="text-xl font-bold text-center mb-6">SK DALAGDAG</h2>

<a href="index.html">Dashboard</a><br>
<a href="announcements.html">Announcements</a><br>
<a href="committees.html">Committees</a><br>
<a href="schedule.html">Schedule</a><br>
<a href="events.html">Events</a><br>
<a href="kk.html">KK</a><br>
<a href="projects.html">Projects</a><br>
<a href="suggestions.html">Suggestions</a><br>
</aside>

<!-- MAIN -->
<main class="main-content p-6">

<!-- ===== SLIDER (ONLY inside + intro) ===== -->
<div class="mb-10 rounded-2xl overflow-hidden shadow-xl bg-green-900 relative">

<img src="inside.png" class="slide active w-full">
<img src="intro.png" class="slide w-full">

<button onclick="changeSlide(-1)" class="absolute left-3 top-1/2 -translate-y-1/2 bg-black/40 text-white px-3 py-1 rounded-full">❮</button>
<button onclick="changeSlide(1)" class="absolute right-3 top-1/2 -translate-y-1/2 bg-black/40 text-white px-3 py-1 rounded-full">❯</button>

<div class="absolute bottom-3 w-full text-center">
<span class="dot active"></span>
<span class="dot"></span>
</div>

</div>

<!-- ===== BUTTONS (YOUR EXACT LIST) ===== -->
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">

<div onclick="location.href='events.html'" class="stats-card">
<div class="card-icon bg-blue-600">🏆</div>
<h3 class="mt-6 font-bold">Events</h3>
</div>

<div onclick="location.href='schedule.html'" class="stats-card">
<div class="card-icon bg-amber-700">📅</div>
<h3 class="mt-6 font-bold">Schedule</h3>
</div>

<div onclick="location.href='suggestions.html'" class="stats-card">
<div class="card-icon bg-red-600">💡</div>
<h3 class="mt-6 font-bold">Suggestions</h3>
</div>

<div onclick="location.href='announcements.html'" class="stats-card">
<div class="card-icon bg-orange-500">📢</div>
<h3 class="mt-6 font-bold">Announcements</h3>
</div>

<div onclick="location.href='committees.html'" class="stats-card">
<div class="card-icon bg-[#795548]">👥</div>
<h3 class="mt-6 font-bold">Committees</h3>
</div>

<div onclick="location.href='kk.html'" class="stats-card">
<div class="card-icon bg-green-600">📋</div>
<h3 class="mt-6 font-bold">KK</h3>
</div>

<div onclick="location.href='projects.html'" class="stats-card">
<div class="card-icon bg-purple-600">📁</div>
<h3 class="mt-6 font-bold">Projects</h3>
</div>

</div>

</main>

<script>

let index = 0;
const slides = document.querySelectorAll(".slide");
const dots = document.querySelectorAll(".dot");

function showSlide(i){
  slides.forEach(s=>s.classList.remove("active"));
  dots.forEach(d=>d.classList.remove("active"));

  slides[i].classList.add("active");
  dots[i].classList.add("active");
}

function changeSlide(n){
  index += n;
  if(index >= slides.length) index = 0;
  if(index < 0) index = slides.length - 1;
  showSlide(index);
}

setInterval(()=>{ changeSlide(1); }, 4000);

</script>

</body>
</html>
