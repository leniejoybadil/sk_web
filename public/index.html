<!DOCTYPE html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>

<title>SK Dalagdag | Dashboard</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');

body {
  font-family: 'Roboto', sans-serif;
  background-color: #f0f2f5;
  margin: 0;
  overflow-x: hidden;
}

/* Sidebar */
.sidebar {
  width: 260px;
  height: 100vh;
  position: fixed;
  background: #1b5e20;
  color: white;
  padding: 20px;
  z-index: 100;
}

.main-content {
  margin-left: 260px;
  min-height: 100vh;
}

/* Cards */
.stats-card {
  background: white;
  border-radius: 8px;
  position: relative;
  box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  transition: 0.3s;
  margin-top: 20px;
}
.stats-card:hover {
  transform: translateY(-5px);
}

.card-icon {
  position: absolute;
  top: -15px;
  left: 15px;
  width: 60px;
  height: 60px;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 22px;
}

/* SLIDER */
.slide { display:none; }
.slide.active { display:block; }

.hero-banner {
  height: 260px;
}
@media(min-width:768px){
  .hero-banner { height: 360px; }
}

/* Mobile */
@media(max-width:768px){
  .sidebar { transform: translateX(-260px); }
  .sidebar.active { transform: translateX(0); }
  .main-content { margin-left: 0; }
}
</style>
</head>

<body class="flex">

<!-- SIDEBAR -->
<aside id="sidebar" class="sidebar shadow-2xl bg-[#1b5e20]">
    <div class="flex justify-between items-center mb-6 border-b border-white/10 pb-4">
        <div class="text-center w-full">
            <h2 class="text-xl font-black tracking-tighter text-white">SK DALAGDAG</h2>
            <p class="text-[10px] opacity-60 text-white uppercase tracking-widest">Youth Portal</p>
        </div>
        <button onclick="toggleMenu()" class="md:hidden text-2xl text-white absolute right-4">✕</button>
    </div>

    <nav class="flex flex-col gap-1">
       <a href="index.html" class="block w-full px-4 py-3 rounded-lg bg-white text-green-800 font-bold shadow-sm hover:bg-green-100 transition flex items-center gap-2">
📊 Dashboard
</a>
        <a href="announcements.html" class="nav-item">
            <span class="nav-icon">📢</span>
            <span>Announcements</span>
        </a>
        <a href="committees.html" class="nav-item">
            <span class="nav-icon">👥</span>
            <span>Committees</span>
        </a>
        <a href="schedules.html" class="nav-item">
            <span class="nav-icon">📅</span>
            <span>Schedule</span>
        </a>
        <a href="events.html" class="nav-item">
            <span class="nav-icon">🏆</span>
            <span>Events</span>
        </a>
        <a href="kk.html" class="nav-item">
            <span class="nav-icon">📋</span>
            <span>KK Profiling</span>
        </a>
        <a href="projects.html" class="nav-item">
            <span class="nav-icon">📁</span>
            <span>Projects</span>
        </a>
        <a href="suggestions.html" class="nav-item">
            <span class="nav-icon">💡</span>
            <span>Suggestions</span>
        </a>

        <div class="pt-10">
            <button onclick="logout()" class="w-full flex items-center justify-center gap-2 bg-red-600 hover:bg-red-700 text-white font-bold py-2 rounded-lg transition">
    🚪 Logout
</button>
        </div>
    </nav>
</aside>
<!-- MAIN -->
<main class="main-content flex-1">

<header class="bg-white p-4 flex justify-between items-center">
<button onclick="toggleMenu()">☰</button>
<h1>Main / <span id="displayRole">USER</span></h1>
</header>

<div class="p-6">

<!-- SLIDER -->
<div class="hero-banner relative rounded-xl overflow-hidden shadow-lg">

<img src="bridge.png" class="slide active w-full h-full object-cover">
<img src="intro.png" class="slide w-full h-full object-cover">

<button onclick="changeSlide(-1)" class="absolute left-3 top-1/2 -translate-y-1/2 bg-black/40 text-white px-3 py-1">❮</button>
<button onclick="changeSlide(1)" class="absolute right-3 top-1/2 -translate-y-1/2 bg-black/40 text-white px-3 py-1">❯</button>

</div>

<!-- BUTTONS -->
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mt-10">

<div onclick="location.href='announcements.html'" class="stats-card p-6 cursor-pointer">

<div onclick="location.href='events.html'" class="stats-card p-6 cursor-pointer">

<script>
/* =========================
   LOGIN CHECK (FIXED)
========================= */
window.addEventListener("DOMContentLoaded", () => {

    const role = localStorage.getItem('role');

    if (!role) {
        window.location.replace("login.html");
        return;
    }

    const roleDisplay = document.getElementById('displayRole');
    if (roleDisplay) roleDisplay.innerText = role;

});

/* =========================
   MENU TOGGLE (ADD IF MISSING)
========================= */
function toggleMenu() {
    document.getElementById('sidebar').classList.toggle('active');
}


/* =========================
   LOGOUT (FIXED - YOU WERE MISSING THIS)
========================= */
function logout() {
    localStorage.removeItem('role');
    window.location.replace("login.html");
}


/* =========================
   SLIDER
========================= */
let index = 0;
const slides = document.querySelectorAll(".slide");

function showSlide(i){
  slides.forEach(s => s.classList.remove("active"));
  slides[i].classList.add("active");
}

function changeSlide(n){
  index += n;
  if(index >= slides.length) index = 0;
  if(index < 0) index = slides.length - 1;
  showSlide(index);
}

setInterval(() => changeSlide(1), 4000);

</script>
</body>
</html>
