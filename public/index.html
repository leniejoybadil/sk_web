<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: Arial; background:#f3f4f6; }

#intro {
  position: fixed;
  inset: 0;
  background: white;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
}

.spin {
  width:140px;
  animation: rotate 3s linear infinite;
}

@keyframes rotate {
  from { transform: rotate(0); }
  to { transform: rotate(360deg); }
}

.btn {
  height:85px;
  border-radius:14px;
  color:white;
  font-weight:bold;
}

.section { display:none; padding:10px; }

.card {
  background:white;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <img src="sklogo.jpg" class="spin">
  <p class="font-bold mt-2">SK DALAGDAG</p>
</div>

<script>
setTimeout(()=>document.getElementById("intro").style.display="none",2500);
</script>

<!-- HEADER -->
<div class="flex justify-between items-center p-2 bg-white shadow">
  <img src="davao.png" class="w-12">
  <h2 class="font-bold">SK DALAGDAG SYSTEM</h2>
  <img src="sklogo.png" class="w-12">
</div>

<!-- BUTTONS -->
<div class="grid grid-cols-2 gap-2 p-3">

<button onclick="window.location.href='committees.html'" class="btn bg-green-700">SK COMMITTEES</button>
<button onclick="window.location.href='budget.html'" class="btn bg-green-600">SK BUDGET 2026</button>
<button onclick="window.location.href='announcements.html'" class="btn bg-yellow-600">ANNOUNCEMENTS</button>
<button onclick="window.location.href='schedule.html'" class="btn bg-blue-600">SCHEDULES</button>
<button onclick="window.location.href='projects.html'" class="btn bg-blue-700">PROJECTS 2026</button>
<button onclick="window.location.href='registration.html'" class="btn bg-purple-600">REGISTRATION</button>
<button onclick="window.location.href='suggestion.html'" class="btn bg-pink-600">SUGGESTION BOX</button>
<button onclick="window.location.href='kk.html'" class="btn bg-green-800">KK PROFILING</button>

</div>

</body>
</html>
