<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: Arial; background:#f3f4f6; }

#intro {
  position: fixed;
  inset: 0;
  background: white;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
}

.spin {
  width:140px;
  animation: rotate 3s linear infinite;
}

@keyframes rotate {

  to { transform: rotate(360deg); }
}

.btn {
  height:85px;
  border-radius:14px;
  color:white;
  font-weight:bold;
}

.section { display:none; padding:10px; }

.card {
  background:white;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}

  </div>
</div>

<style>
#intro{
  position:fixed;
  inset:0;
  background:rgb(255, 255, 255);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
  animation: fadeOut 2.5s forwards;
}

@keyframes fadeOut{
  0%{opacity:1;}

}
</style>


<script>
