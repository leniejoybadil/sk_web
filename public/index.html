<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>SK Dalagdag | Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');
        body { font-family: 'Roboto', sans-serif; background-color: #f0f2f5; margin: 0; overflow-x: hidden; }

        .sidebar { 
            width: 260px; height: 100vh; position: fixed; 
            background: #1b5e20; color: white; padding: 20px; 
            z-index: 100; transition: 0.3s; 
        }
        .main-content { margin-left: 260px; transition: 0.3s; min-height: 100vh; }

        .stats-card {
            background: white; border-radius: 8px;
            position: relative; box-shadow: 0 1px 4px rgba(0,0,0,0.1);
            transition: transform 0.3s ease; margin-top: 20px;
        }
        .stats-card:hover { transform: translateY(-5px); }

        .card-icon {
            position: absolute; top: -15px; left: 15px;
            width: 60px; height: 60px; border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 22px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* ===== SLIDER ===== */
        .slide { display:none }
        .slide.active { display:block }

        .dot {
            height:10px; width:10px; margin:0 4px;
            background:#ccc; display:inline-block; border-radius:50%;
        }
        .dot.active { background:#1b5e20 }

        @media(max-width:768px) {
            .sidebar { transform: translateX(-260px); }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-left: 0; }
            .grid-container { grid-template-columns: 1fr !important; gap: 45px !important; }
            .hero-img { max-height: 180px; }
        }
    </style>
</head>

<body class="flex">

<aside id="sidebar" class="sidebar shadow-2xl">
    <div class="flex justify-between items-center mb-6 border-b border-white/20 pb-4">
        <div class="text-center w-full">
            <h2 class="text-xl font-black tracking-tighter">SK DALAGDAG</h2>
            <p class="text-[10px] opacity-60 uppercase tracking-widest">Youth Portal</p>
        </div>
        <button onclick="toggleMenu()" class="md:hidden text-2xl absolute right-4">✕</button>
    </div>
    <nav class="space-y-1">
        <a href="index.html" class="flex items-center gap-4 p-3 bg-white/20 rounded-lg font-bold"><span>📊</span> Dashboard</a>
        <a href="announcements.html" class="flex items-center gap-4 p-3 hover:bg-white/10 rounded-lg"><span>📢</span> Announcements</a>
        <a href="committees.html" class="flex items-center gap-4 p-3 hover:bg-white/10 rounded-lg"><span>👥</span> Committees</a>
        <a href="schedules.html" class="flex items-center gap-4 p-3 hover:bg-white/10 rounded-lg"><span>📅</span> Schedules</a>
        <a href="events.html" class="flex items-center gap-4 p-3 hover:bg-white/10 rounded-lg"><span>🏆</span> Events</a>

        <div class="pt-10">
            <button onclick="logout()" class="w-full p-3 bg-red-600 rounded-lg font-bold">🚪 Logout</button>
        </div>
    </nav>
</aside>

<main class="main-content flex-1 flex flex-col">

<header class="sticky top-0 bg-white p-4 flex justify-between items-center border-b">
    <div class="flex items-center gap-4">
        <button onclick="toggleMenu()" class="md:hidden text-2xl">☰</button>
        <h1 class="text-xs uppercase">Main / <span id="displayRole" class="text-green-700 font-bold">USER</span></h1>
    </div>
    <div id="adminBadge" class="hidden bg-yellow-400 px-3 py-1 rounded-full text-xs font-bold">ADMIN</div>
</header>

<div class="p-4 md:p-8">

<!-- ===== SLIDER REPLACED HERE ===== -->
<div class="mb-10 rounded-2xl overflow-hidden shadow-xl bg-green-900 relative">

    <img src="inside.png" class="slide active w-full hero-img object-cover">
    <img src="intro.png" class="slide w-full hero-img object-cover">
    <img src="sklogo.png" class="slide w-full hero-img object-cover">

    <button onclick="changeSlide(-1)" class="absolute left-3 top-1/2 -translate-y-1/2 bg-black/40 text-white px-3 py-1 rounded-full">❮</button>
    <button onclick="changeSlide(1)" class="absolute right-3 top-1/2 -translate-y-1/2 bg-black/40 text-white px-3 py-1 rounded-full">❯</button>

    <div class="absolute bottom-3 w-full text-center">
        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
    </div>

</div>

<!-- CARDS (UNCHANGED) -->
<div class="grid-container grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-x-6 gap-y-12 mt-10">

<div onclick="location.href='announcements.html'" class="stats-card p-6 text-right cursor-pointer">
<div class="card-icon bg-orange-500">📢</div>
<h3 class="text-lg font-bold text-gray-700 mt-6">Announcements</h3>
</div>

<div onclick="location.href='kk.html'" class="stats-card p-6 text-right cursor-pointer">
<div class="card-icon bg-green-600">📋</div>
<h3 class="text-lg font-bold text-gray-700 mt-6">KK Profiling</h3>
</div>

<div onclick="location.href='events.html'" class="stats-card p-6 text-right cursor-pointer">
<div class="card-icon bg-blue-600">🏆</div>
<h3 class="text-lg font-bold text-gray-700 mt-6">Events</h3>
</div>

</div>

</div>
</main>

<script>
if (!sessionStorage.getItem('role')) {
    window.location.href = "login.html";
}

function toggleMenu(){
    document.getElementById('sidebar').classList.toggle('active');
}

function logout(){
    sessionStorage.clear();
    window.location.href = "login.html";
}

/* ===== SLIDER SCRIPT ===== */
let index = 0;
const slides = document.querySelectorAll(".slide");
const dots = document.querySelectorAll(".dot");

function showSlide(i){
  slides.forEach(s=>s.classList.remove("active"));
  dots.forEach(d=>d.classList.remove("active"));

  slides[i].classList.add("active");
  dots[i].classList.add("active");
}

function changeSlide(n){
  index += n;
  if(index >= slides.length) index = 0;
  if(index < 0) index = slides.length - 1;
  showSlide(index);
}

setInterval(()=>{ changeSlide(1); }, 4000);
</script>

</body>
</html>
