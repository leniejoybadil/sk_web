<!DOCTYPE html>
<html>
<head>
  <title>KK Profiling Form</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      font-family: Arial;
      background: #eee;
    }

    .page {
      width: 210mm;
      min-height: 297mm;
      margin: auto;
      background: white;
      padding: 20px;
      border: 1px solid black;
    }

    .box {
      border: 1px solid black;
      padding: 6px;
      font-size: 12px;
    }

    label {
      font-size: 11px;
      font-weight: bold;
    }

    input, select {
      width: 100%;
      border: none;
      outline: none;
      font-size: 12px;
    }
  </style>
</head>

<body>

<div class="page">

<!-- HEADER -->
<div class="flex justify-between items-center mb-4">

  <div class="box w-20 h-20 flex items-center justify-center">
    <img src="logo.jpg" class="w-full h-full object-cover">
  </div>

  <div class="text-center">
    <p>Republic of the Philippines</p>
    <p>Province of Davao del Sur</p>
    <p>City of Davao</p>
    <p><b>Barangay DALAGDAG</b></p>
    <h3><b>KK PROFILING FORM</b></h3>
  </div>

  <div class="box w-20 h-20 flex items-center justify-center">
    <img src="sklogo.jpg" class="w-full h-full object-cover">
  </div>

</div>

<!-- PERSONAL INFO -->
<h3><b>PERSONAL INFORMATION</b></h3>

<div class="grid grid-cols-2 gap-2">

  <div class="box">
    <label>FULL NAME</label>
    <input id="fullname">
  </div>

  <div class="box">
    <label>CONTACT</label>
    <input id="contact">
  </div>

  <div class="box">
    <label>EMAIL</label>
    <input id="email">
  </div>

  <div class="box">
    <label>ADDRESS</label>
    <input id="address">
  </div>

</div>

<!-- DEMOGRAPHICS -->
<h3><b>DEMOGRAPHICS</b></h3>

<div class="grid grid-cols-3 gap-2">

  <div class="box">
    <label>GENDER</label>
    <select id="gender">
      <option>Male</option>
      <option>Female</option>
    </select>
  </div>

  <div class="box">
    <label>CIVIL STATUS</label>
    <select id="civil">
      <option>Single</option>
      <option>Married</option>
      <option>Widowed</option>
    </select>
  </div>

  <div class="box">
    <label>BIRTHDATE</label>
    <input type="date" id="birthdate" onchange="calcAge()">
  </div>

</div>

<div class="box mt-2">
  <label>AGE</label>
  <input id="age" readonly>
</div>

<script>
function calcAge(){
  let b = new Date(document.getElementById("birthdate").value);
  let t = new Date();
  document.getElementById("age").value = t.getFullYear() - b.getFullYear();
}
</script>

<!-- YOUTH CLASSIFICATION -->
<h3><b>YOUTH CLASSIFICATION</b></h3>

<div class="grid grid-cols-2 gap-2 text-sm">

  <label class="flex items-center gap-2"><input type="checkbox"> In-School Youth</label>
  <label class="flex items-center gap-2"><input type="checkbox"> Out-of-School Youth</label>
  <label class="flex items-center gap-2"><input type="checkbox"> Working Youth</label>
  <label class="flex items-center gap-2"><input type="checkbox"> PWD</label>

</div>

<!-- EDUCATION -->
<h3><b>EDUCATIONAL ATTAINMENT</b></h3>

<div class="box">
<select id="education">
  <option>Elementary Level</option>
  <option>Elementary Graduate</option>
  <option>High School Level</option>
  <option>High School Graduate</option>
  <option>College Level</option>
  <option>College Graduate</option>
  <option>Vocational Graduate</option>
  <option>Masters Level</option>
  <option>Masters Graduate</option>
  <option>Doctorate Level</option>
  <option>Doctorate Graduate</option>
  <option>No Educational Attainment</option>
</select>
</div>

<!-- EMPLOYMENT -->
<h3><b>EMPLOYMENT STATUS</b></h3>

<div class="box">
<select id="employment">
  <option>Employed</option>
  <option>Unemployed</option>
  <option>Self-Employed</option>
  <option>Currently Looking for Job</option>
  <option>Not Interested</option>
</select>
</div>

<!-- VOTING -->
<h3><b>VOTING STATUS</b></h3>

<div class="grid grid-cols-3 gap-2">

  <div class="box">
    <label>SK VOTER</label>
    <select id="skVoter">
      <option>Yes</option>
      <option>No</option>
    </select>
  </div>

  <div class="box">
    <label>SK VOTED</label>
    <select id="skVote">
      <option>Yes</option>
      <option>No</option>
    </select>
  </div>

  <div class="box">
    <label>NATIONAL VOTER</label>
    <select id="nationalVoter">
      <option>Yes</option>
      <option>No</option>
    </select>
  </div>

</div>

<!-- SUBMIT -->
<div class="text-center mt-4">
  <button onclick="submitForm()" class="bg-green-700 text-white px-6 py-2">
    SUBMIT
  </button>
</div>

<script>
function submitForm(){

const data = {
  fullname: fullname.value,
  contact: contact.value,
  email: email.value,
  address: address.value,
  gender: gender.value,
  civil: civil.value,
  birthdate: birthdate.value,
  age: age.value,
  education: education.value,
  employment: employment.value,
  skVoter: skVoter.value,
  skVote: skVote.value,
  nationalVoter: nationalVoter.value
};

fetch("https://script.google.com/a/macros/hcdc.edu.ph/s/AKfycbx7BU0PCsjI9rLqsHyAUwlmPUVU2v_0MIjTgP2wCKCYMis7pcJVe1hF6gHfdCV5nHXn/exec", {
  method: "POST",
  body: JSON.stringify(data)
})
.then(res => res.text())
.then(res => alert("Saved to Google Sheets!"));

}
</script>

</div>

</body>
</html>
