<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{font-family:Arial;background:#f3f3f3}

.header{
display:flex;
justify-content:space-between;
align-items:center;
background:white;
padding:10px;
}

.header img{width:55px}

.box{
background:white;
border:1px solid #000;
padding:8px;
margin-top:8px;
}

.label{font-size:10px;color:#555}

.option{
display:flex;
align-items:center;
gap:8px;
margin:3px 0;
}

@media print{
button{display:none}
body{background:white}
.box{break-inside:avoid}
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<img src="davao.png">

<div class="text-center font-bold text-sm">
REPUBLIC OF THE PHILIPPINES<br>
BARANGAY DALAGDAG<br>
SK KK PROFILING FORM
</div>

<img src="sklogo.jpg">
</div>

<div class="p-3">

<!-- BASIC INFO -->
<div class="box">
<div class="label">FULL NAME</div>
<input id="fullname" class="w-full outline-none">

<div class="label mt-2">CONTACT NUMBER</div>
<input id="contact" class="w-full outline-none">

<div class="label mt-2">EMAIL</div>
<input id="email" class="w-full outline-none">

<div class="label mt-2">ADDRESS</div>
<input id="address" class="w-full outline-none">
</div>

<!-- BIRTHDATE -->
<div class="box">
<div class="label">BIRTHDATE</div>
<input type="date" id="birthdate" class="w-full" onchange="calcAge()">

<div class="label mt-2">AGE</div>
<input id="age" class="w-full outline-none" readonly>
</div>

<script>
function calcAge(){
let b=new Date(birthdate.value);
let t=new Date();
age.value=t.getFullYear()-b.getFullYear();
}
</script>

<!-- YOUTH TYPE -->
<div class="box">
<div class="label">YOUTH TYPE</div>

<label class="option"><input type="checkbox"> In-School Youth</label>
<label class="option"><input type="checkbox"> Out-of-School Youth</label>
<label class="option"><input type="checkbox"> Working Youth</label>
<label class="option"><input type="checkbox"> PWD</label>

</div>

<!-- EDUCATIONAL ATTAINMENT (RESTORED FULL LIST) -->
<div class="box">
<div class="label">EDUCATIONAL ATTAINMENT</div>

<label class="option"><input type="radio" name="edu"> Elementary Level</label>
<label class="option"><input type="radio" name="edu"> Elementary Graduate</label>
<label class="option"><input type="radio" name="edu"> High School Level</label>
<label class="option"><input type="radio" name="edu"> High School Graduate</label>
<label class="option"><input type="radio" name="edu"> College Level</label>
<label class="option"><input type="radio" name="edu"> College Graduate</label>
<label class="option"><input type="radio" name="edu"> Vocational Graduate</label>
<label class="option"><input type="radio" name="edu"> Masters Level</label>
<label class="option"><input type="radio" name="edu"> Masters Graduate</label>
<label class="option"><input type="radio" name="edu"> Doctorate Level</label>
<label class="option"><input type="radio" name="edu"> Doctorate Graduate</label>
<label class="option"><input type="radio" name="edu"> No Educational Attainment</label>

</div>

<!-- EMPLOYMENT -->
<div class="box">
<div class="label">EMPLOYMENT STATUS</div>

<label class="option"><input type="radio" name="emp"> Employed</label>
<label class="option"><input type="radio" name="emp"> Not Employed</label>
<label class="option"><input type="radio" name="emp"> Self-Employed</label>
<label class="option"><input type="radio" name="emp"> Currently Looking for Job</label>
<label class="option"><input type="radio" name="emp"> Not Interested in Looking for Job</label>

</div>

<!-- SK PARTICIPATION -->
<div class="box">
<div class="label">SK PARTICIPATION</div>

<p><b>Registered SK Voter?</b></p>
<label class="option"><input type="radio" name="v1"> Yes</label>
<label class="option"><input type="radio" name="v1"> No</label>

<p><b>Did you vote last SK Election?</b></p>
<label class="option"><input type="radio" name="v2"> Yes</label>
<label class="option"><input type="radio" name="v2"> No</label>

<p><b>Did you attend KK Assembly?</b></p>
<label class="option"><input type="radio" name="v3" onclick="show(true)"> Yes</label>
<label class="option"><input type="radio" name="v3" onclick="show(false)"> No</label>

<div id="kktimes" style="display:none">
<p><b>If YES, how many times?</b></p>
<label class="option"><input type="radio" name="t">1-2</label>
<label class="option"><input type="radio" name="t">3-5</label>
<label class="option"><input type="radio" name="t">More than 5</label>
</div>

</div>

<script>
function show(v){
kktimes.style.display=v?"block":"none";
}
</script>

<!-- BUTTONS -->
<button onclick="submitForm()" class="bg-green-600 text-white w-full p-2 mt-3">
SUBMIT
</button>

<button onclick="window.print()" class="bg-red-600 text-white w-full p-2 mt-2">
DOWNLOAD PDF
</button>

</div>

<!-- SUBMIT -->
<script>
function submitForm(){

const data = {
fullname: fullname.value,
contact: contact.value,
email: email.value,
address: address.value,
birthdate: birthdate.value,
age: age.value,

sk_voter: document.querySelector('input[name="v1"]:checked')?.value,
sk_vote: document.querySelector('input[name="v2"]:checked')?.value,
kk_attend: document.querySelector('input[name="v3"]:checked')?.value,
kk_times: document.querySelector('input[name="t"]:checked')?.value
};

fetch("https://script.google.com/macros/s/AKfycbwMmUZJAQTbbi2GQiC2m-BngIgPIbNBub7z355UJu_71L8MzqDQKxJVV404p5Vk6KRm/exec", {
method: "POST",
mode: "no-cors",
headers: { "Content-Type": "application/json" },
body: JSON.stringify(data)
});

alert("Submitted to Google Sheets!");
}
</script>
