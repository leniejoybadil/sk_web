<!DOCTYPE html>
<html>
<head>
  <title>KK Profiling</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-3xl mx-auto bg-white p-6 mt-6 rounded shadow">

<h2 class="text-center font-bold text-purple-900">
KK Survey Questionnaire / Youth Profiling Form
</h2>

<div class="grid md:grid-cols-2 gap-3 mt-4">

<input id="name" placeholder="Full Name" class="border p-2 rounded">
<input id="house" placeholder="Household #" class="border p-2 rounded">
<input id="address" placeholder="Address" class="border p-2 rounded md:col-span-2">

<select id="gender" class="border p-2 rounded">
<option>Male</option>
<option>Female</option>
</select>

<input id="age" placeholder="Age" class="border p-2 rounded">
<input id="dob" type="date" class="border p-2 rounded">

<select id="civil" class="border p-2 rounded">
<option>Single</option>
<option>Married</option>
</select>

<select id="edu" class="border p-2 rounded">
<option>Elementary</option>
<option>High School</option>
<option>College</option>
</select>

<select id="emp" class="border p-2 rounded">
<option>Student</option>
<option>Employed</option>
<option>Unemployed</option>
</select>

</div>

<button onclick="pdf()" class="bg- light brown-900 text-white p-2 mt-4 w-full rounded">
Generate PDF
</button>

</div>

<script>
function pdf(){
const { jsPDF } = window.jspdf;
let doc = new jsPDF();

doc.text("KK PROFILING FORM",10,10);
doc.text("Name: "+document.getElementById("name").value,10,30);
doc.text("Age: "+document.getElementById("age").value,10,40);
doc.save("KK_Form.pdf");
}
</script>

</body>
</html>
