<!DOCTYPE html>
<html>
<head>
  <title>KK Profiling Form</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { font-family: Arial; }
    .box { border: 1px solid black; padding: 6px; }
  </style>
</head>

<body class="p-4 bg-white">

<!-- HEADER WITH LOGOS -->
<div class="flex justify-between items-center mb-4">

  <!-- LEFT LOGO -->
  <div class="w-20 h-20 border border-black flex items-center justify-center">
    <img src="logo.jpg" class="w-full h-full object-cover" />
  </div>

  <!-- CENTER TEXT -->
  <div class="text-center">
    <p class="text-sm">Republic of the Philippines</p>
    <p class="text-sm">Province of Davao del Sur</p>
    <p class="text-sm">City of Davao</p>
    <p class="text-sm font-bold">Barangay DALAGDAG</p>

    <h1 class="font-bold mt-2">
      KATIPUNAN NG KABATAAN (KK) PROFILING FORM
    </h1>
  </div>

  <!-- RIGHT LOGO -->
  <div class="w-20 h-20 border border-black flex items-center justify-center">
    <img src="sklogo.jpg" class="w-full h-full object-cover" />
  </div>


<!-- PERSONAL INFO -->
<div class="grid grid-cols-2 gap-2">

  <div class="box">
    <label>Full Name</label>
    <input id="fullname" class="w-full border p-1">
  </div>

  <div class="box">
    <label>Contact Number</label>
    <input id="contact" class="w-full border p-1">
  </div>

  <div class="box">
    <label>Email</label>
    <input id="email" class="w-full border p-1">
  </div>

  <div class="box">
    <label>Address</label>
    <input id="address" class="w-full border p-1">
  </div>

</div>

<!-- DEMOGRAPHICS -->
<h2 class="font-bold mt-4">DEMOGRAPHICS</h2>

<div class="grid grid-cols-3 gap-2">

  <div class="box">
    <label>Gender</label>
    <select id="gender" class="w-full border">
      <option>Male</option>
      <option>Female</option>
    
    </select>
  </div>

  <div class="box">
    <label>Civil Status</label>
    <select id="civil" class="w-full border">
      <option>Single</option>
      <option>Married</option>
      <option>Widowed</option>
    </select>
  </div>

  <div class="box">
    <label>Birthdate</label>
    <input type="date" id="birthdate" class="w-full border" onchange="calcAge()">
  </div>

</div>

<div class="box mt-2">
  <label>Age</label>
  <input id="age" class="w-full border" readonly>
</div>

<script>
function calcAge(){
  let b = new Date(document.getElementById("birthdate").value);
  let t = new Date();
  document.getElementById("age").value = t.getFullYear() - b.getFullYear();
}
</script>

<!-- EDUCATION -->
<h2 class="font-bold mt-4">EDUCATION</h2>

<select id="education" class="border w-full">
  <option>Elementary Level</option>
  <option>Elementary Graduate</option>
  <option>High School Level</option>
  <option>High School Graduate</option>
  <option>College Level</option>
  <option>College Graduate</option>
  <option>Vocational Graduate</option>
  <option>Masters Level</option>
  <option>Masters Graduate</option>
  <option>Doctorate Level</option>
  <option>Doctorate Graduate</option>
  <option>No Educational Attainment</option>
</select>

<!-- EMPLOYMENT -->
<h2 class="font-bold mt-4">EMPLOYMENT STATUS</h2>

<select id="employment" class="border w-full">
  <option>Employed</option>
  <option>Unemployed</option>
  <option>Self-Employed</option>
  <option>Currently Looking for Job</option>
  <option>Not Interested</option>
</select>

<!-- VOTING -->
<h2 class="font-bold mt-4">VOTING STATUS</h2>

<select id="skVoter" class="border w-full">
  <option>Registered SK Voter - Yes</option>
  <option>No</option>
</select>

<select id="skVote" class="border w-full mt-1">
  <option>Voted Last SK Election - Yes</option>
  <option>No</option>
</select>

<select id="nationalVoter" class="border w-full mt-1">
  <option>Registered National Voter - Yes</option>
  <option>No</option>
</select>

<!-- SUBMIT -->
<div class="mt-6 text-center">
  <button onclick="submitForm()" class="bg-green-700 text-white px-6 py-2">
    Submit to Google Sheets
  </button>
</div>

<script>
function submitForm(){

const data = {
  fullname: fullname.value,
  contact: contact.value,
  email: email.value,
  address: address.value,
  gender: gender.value,
  civil: civil.value,
  birthdate: birthdate.value,
  age: age.value,
  education: education.value,
  employment: employment.value,
  skVoter: skVoter.value,
  skVote: skVote.value,
  nationalVoter: nationalVoter.value
};

fetch("https://script.google.com/a/macros/hcdc.edu.ph/s/AKfycbx7BU0PCsjI9rLqsHyAUwlmPUVU2v_0MIjTgP2wCKCYMis7pcJVe1hF6gHfdCV5nHXn/exec", {
  method: "POST",
  body: JSON.stringify(data)
})
.then(res => res.text())
.then(res => alert("✅ Saved to Google Sheets!"));

}
</script>

</body>
</html>
